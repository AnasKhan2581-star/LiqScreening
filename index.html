<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PeakSweep · Pattern Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07080c;
  --s1: #0d0f16;
  --s2: #12151f;
  --s3: #181c28;
  --b1: #1c2133;
  --b2: #232a40;
  --v: #6b5ce7;
  --vd: rgba(107,92,231,0.12);
  --vg: rgba(107,92,231,0.25);
  --vl: #8b7cf8;
  --g: #00e5a0;
  --gd: rgba(0,229,160,0.1);
  --r: #ff4466;
  --rd: rgba(255,68,102,0.1);
  --y: #ffc142;
  --yd: rgba(255,193,66,0.1);
  --t1: #dde2f0;
  --t2: #7a8299;
  --t3: #3d4560;
  --mono: 'JetBrains Mono', monospace;
  --head: 'Syne', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--t1);font-family:var(--head)}

/* grain overlay */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* HEADER */
.hdr{
  padding:20px 16px 0;
  position:sticky;top:0;z-index:100;
  background:rgba(7,8,12,0.96);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--b1);
}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.brand{
  font-family:var(--head);font-size:22px;font-weight:800;
  letter-spacing:-1px;line-height:1
}
.brand em{
  color:transparent;font-style:normal;
  background:linear-gradient(135deg,var(--vl),var(--g));
  -webkit-background-clip:text;background-clip:text;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--g);
  box-shadow:0 0 8px var(--g);margin-top:8px;
  animation:blink 2s infinite
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.sub{font-size:11px;color:var(--t3);font-family:var(--mono);margin-bottom:14px;letter-spacing:.3px}

/* PATTERN PREVIEW */
.pat-preview{
  margin-bottom:14px;
  background:var(--s1);border:1px solid var(--b1);
  border-radius:10px;padding:10px 14px;
  display:flex;align-items:center;gap:12px
}
.pat-svg{flex-shrink:0}
.pat-info{}
.pat-name{font-size:12px;font-weight:700;color:var(--vl);letter-spacing:.5px;margin-bottom:2px}
.pat-desc{font-size:10px;color:var(--t3);font-family:var(--mono);line-height:1.5}

/* TIMEFRAME PILLS */
.tf-label{font-size:9px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.tf-pills{display:flex;gap:6px;margin-bottom:12px}
.tf-pill{
  flex:1;padding:9px 4px;text-align:center;
  background:var(--s1);border:1px solid var(--b1);
  border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:700;
  color:var(--t3);cursor:pointer;transition:all .18s;
}
.tf-pill.active{
  background:var(--vd);border-color:var(--vl);color:var(--vl);
  box-shadow:0 0 12px rgba(107,92,231,0.2)
}
.tf-pill:active{transform:scale(.97)}

/* SENSITIVITY ROW */
.sens-row{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--s1);border:1px solid var(--b1);
  border-radius:8px;padding:10px 14px;margin-bottom:10px;gap:10px
}
.sens-info{}
.sens-name{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:1px}
.sens-desc{font-size:10px;color:var(--t3);font-family:var(--mono)}
.sens-btns{display:flex;gap:4px;flex-shrink:0}
.sens-btn{
  padding:5px 10px;border:1px solid var(--b2);background:var(--s2);
  border-radius:6px;font-family:var(--mono);font-size:10px;font-weight:700;
  color:var(--t3);cursor:pointer;transition:all .15s
}
.sens-btn.on{background:var(--vd);border-color:var(--vl);color:var(--vl)}

/* SCAN BTN */
.scan-wrap{padding:0 16px 12px}
.scan-btn{
  width:100%;padding:15px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--v),var(--vl));
  color:#fff;font-family:var(--head);font-size:14px;font-weight:700;
  letter-spacing:.3px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;position:relative;overflow:hidden
}
.scan-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);
}
.scan-btn:active{transform:scale(.98)}
.scan-btn.busy{
  background:var(--s2);color:var(--vl);
  border:1px solid var(--vg);pointer-events:none
}
.spin{width:14px;height:14px;border:2px solid rgba(107,92,231,.3);border-top-color:var(--vl);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PROGRESS */
.prog-wrap{padding:0 16px 10px;display:none}
.prog-track{height:2px;background:var(--b1);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--v),var(--vl));border-radius:2px;transition:width .25s;width:0%}
.prog-lbl{font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:6px;text-align:center}

/* STATS */
.stats{display:flex;gap:6px;padding:0 16px 12px}
.stat{
  flex:1;background:var(--s1);border:1px solid var(--b1);
  border-radius:8px;padding:9px 8px;text-align:center
}
.stat-n{font-family:var(--mono);font-size:18px;font-weight:700;display:block}
.stat-n.v{color:var(--vl)}
.stat-n.g{color:var(--g)}
.stat-n.y{color:var(--y)}
.stat-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;margin-top:1px;display:block}

/* ERROR */
.err{margin:0 16px 10px;padding:10px 14px;background:var(--rd);border:1px solid rgba(255,68,102,.25);border-radius:8px;font-size:11px;color:var(--r);display:none;font-family:var(--mono)}

/* SECTION LABEL */
.sec-lbl{
  padding:4px 16px 8px;font-size:9px;color:var(--t3);
  font-family:var(--mono);text-transform:uppercase;letter-spacing:1.2px;
  display:flex;align-items:center;gap:8px
}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--b1)}

/* COIN CARD */
.list{padding:0 16px;display:flex;flex-direction:column;gap:8px;padding-bottom:36px}
.card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:12px;overflow:hidden;cursor:pointer;
  animation:rise .28s ease both;transition:border-color .2s
}
.card:active{transform:scale(.99)}
.card.strong{border-color:rgba(107,92,231,.4)}
.card.mod{border-color:rgba(255,193,66,.2)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* CARD TOP */
.ctop{display:flex;align-items:center;padding:11px 13px 10px;gap:10px}
.cico{
  width:36px;height:36px;border-radius:50%;
  background:var(--s2);border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:9px;font-weight:700;color:var(--vl);
  flex-shrink:0;overflow:hidden
}
.cico img{width:100%;height:100%;object-fit:cover}
.cmain{flex:1;min-width:0}
.csym{font-size:15px;font-weight:800;display:flex;align-items:center;gap:5px;letter-spacing:-.3px}
.crank{font-size:9px;color:var(--t3);background:var(--s2);border-radius:4px;padding:1px 5px;font-family:var(--mono);font-weight:400}
.cmeta{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:2px}
.cmeta .up{color:var(--g)}.cmeta .dn{color:var(--r)}

/* MINI CHART */
.mini-chart{
  padding:0 13px 0;height:52px;position:relative;margin-bottom:6px
}
.mini-chart canvas{width:100%;height:100%;display:block}

/* PATTERN METRICS */
.pmets{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-top:1px solid var(--b1);
}
.pmet{padding:8px 10px;border-right:1px solid var(--b1)}
.pmet:last-child{border-right:none}
.pmet-l{font-size:8px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;margin-bottom:3px}
.pmet-v{font-size:11px;font-family:var(--mono);font-weight:700}
.pmet-v.g{color:var(--g)}.pmet-v.r{color:var(--r)}.pmet-v.v{color:var(--vl)}.pmet-v.y{color:var(--y)}

/* CONFIDENCE BAR */
.conf-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 13px 10px;border-top:1px solid var(--b1)
}
.conf-label{font-size:9px;color:var(--t3);font-family:var(--mono);width:60px;flex-shrink:0}
.conf-track{flex:1;height:4px;background:var(--b1);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--v),var(--vl));transition:width .4s}
.conf-pct{font-size:10px;font-family:var(--mono);font-weight:700;color:var(--vl);width:32px;text-align:right;flex-shrink:0}
.conf-badge{font-size:9px;font-family:var(--mono);font-weight:700;padding:3px 7px;border-radius:5px;flex-shrink:0}
.conf-badge.s{background:var(--vd);color:var(--vl);border:1px solid rgba(107,92,231,.3)}
.conf-badge.m{background:var(--yd);color:var(--y);border:1px solid rgba(255,193,66,.2)}

/* OPEN BTN */
.obtn{
  width:100%;padding:9px;background:var(--s2);border:none;
  border-top:1px solid var(--b1);
  font-family:var(--mono);font-size:11px;cursor:pointer;
  color:#4d9fff;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:background .15s
}
.obtn:active{background:var(--b1)}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--t3)}
.empty-ico{font-size:36px;margin-bottom:12px}
.empty-t{font-size:14px;font-weight:700;color:var(--t2);margin-bottom:6px}
.empty-s{font-size:11px;font-family:var(--mono);line-height:1.6}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="brand">Peak<em>Sweep</em></div>
      <div class="sub">HH → Drop → HH → Pulling Back · Pattern Scanner</div>
    </div>
    <div class="live-dot"></div>
  </div>

  <!-- Pattern preview -->
  <div class="pat-preview">
    <svg class="pat-svg" width="80" height="40" viewBox="0 0 80 40">
      <polyline points="0,38 10,28 16,32 24,16 30,22 40,8 46,18 58,2 68,14"
        fill="none" stroke="#6b5ce7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- current drop arrow -->
      <polyline points="58,2 68,14 76,26"
        fill="none" stroke="#ff4466" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="4,2"/>
      <circle cx="40" cy="8" r="2.5" fill="#6b5ce7"/>
      <circle cx="58" cy="2" r="2.5" fill="#8b7cf8"/>
      <circle cx="76" cy="26" r="2.5" fill="#ff4466"/>
      <text x="36" y="7" fill="#6b5ce7" font-size="5" font-family="monospace">HH1</text>
      <text x="54" y="1" fill="#8b7cf8" font-size="5" font-family="monospace">HH2</text>
      <text x="62" y="32" fill="#ff4466" font-size="5" font-family="monospace">now↓</text>
    </svg>
    <div class="pat-info">
      <div class="pat-name">DOUBLE PEAK PULLBACK</div>
      <div class="pat-desc">HH1 → retrace → HH2 higher<br>→ currently dropping from HH2</div>
    </div>
  </div>

  <!-- Timeframe -->
  <div class="tf-label">Timeframe · 500 candles</div>
  <div class="tf-pills">
    <div class="tf-pill" data-tf="1m" onclick="setTF(this)">1m</div>
    <div class="tf-pill" data-tf="5m" onclick="setTF(this)">5m</div>
    <div class="tf-pill active" data-tf="15m" onclick="setTF(this)">15m</div>
    <div class="tf-pill" data-tf="1h" onclick="setTF(this)">1h</div>
    <div class="tf-pill" data-tf="4h" onclick="setTF(this)">4h</div>
  </div>

  <!-- Sensitivity -->
  <div class="sens-row">
    <div class="sens-info">
      <div class="sens-name">Pattern Sensitivity</div>
      <div class="sens-desc">How strict peak detection is</div>
    </div>
    <div class="sens-btns">
      <div class="sens-btn" data-s="loose" onclick="setSens(this)">Loose</div>
      <div class="sens-btn on" data-s="normal" onclick="setSens(this)">Normal</div>
      <div class="sens-btn" data-s="strict" onclick="setSens(this)">Strict</div>
    </div>
  </div>
</div>

<div class="scan-wrap">
  <button class="scan-btn" id="scanBtn" onclick="runScan()">
    <span id="btnTxt">▶ SCAN PATTERN</span>
  </button>
</div>

<div class="prog-wrap" id="progWrap">
  <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  <div class="prog-lbl" id="progLbl">Initializing...</div>
</div>

<div class="err" id="err"></div>

<div class="stats" id="statRow" style="display:none">
  <div class="stat"><span class="stat-n v" id="sScanned">0</span><span class="stat-l">Scanned</span></div>
  <div class="stat"><span class="stat-n g" id="sMatched">0</span><span class="stat-l">Matched</span></div>
  <div class="stat"><span class="stat-n y" id="sStrong">0</span><span class="stat-l">🔥 Strong</span></div>
</div>

<div id="out"></div>

<script>
// ── STATE ──
let activeTF = '15m';
let activeSens = 'normal';
let results = [];

// ── TOP 100 BINANCE SPOT COINS BY MARKET CAP ──
// Fetched live then filtered against Binance spot pairs
const TOP100 = [
  'BTC','ETH','BNB','SOL','XRP','DOGE','ADA','AVAX','LINK','DOT',
  'TON','TRX','SHIB','SUI','LTC','HBAR','BCH','NEAR','PEPE','APT',
  'UNI','ICP','ETC','ARB','POL','RENDER','KAS','OP','BONK','VET',
  'FIL','ATOM','AAVE','MKR','WIF','FTM','INJ','GRT','IMX','RUNE',
  'SEI','FLOKI','AR','JASMY','LDO','STX','MANA','SAND','WLD','NOT',
  'ENS','GALA','AXS','BLUR','CRV','SNX','COMP','ZIL','ONE','ROSE',
  'APE','ZEC','DASH','MASK','PENDLE','DYDX','GMX','YFI','SUSHI',
  'ANKR','CHZ','BAT','ZRX','OCEAN','KNC','LRC','SKL','CELR','REN',
  'BAND','STORJ','NMR','GNO','ENJ','FLOW','HIVE','FLR','KAVA','QTUM',
  'MINA','ONT','ICX','ZEN','ELF','IOTA','SC','DGB','XEM','NANO'
];

const $ = id => document.getElementById(id);

function setTF(el) {
  document.querySelectorAll('.tf-pill').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  activeTF = el.dataset.tf;
}

function setSens(el) {
  document.querySelectorAll('.sens-btn').forEach(e => e.classList.remove('on'));
  el.classList.add('on');
  activeSens = el.dataset.s;
}

function setProgress(pct, lbl) {
  $('progFill').style.width = pct + '%';
  $('progLbl').textContent = lbl;
}

function showErr(msg) {
  const e = $('err');
  e.textContent = msg;
  e.style.display = msg ? 'block' : 'none';
}

// ── ABORT CONTROLLER HELPER ──
function timeout(ms) {
  const c = new AbortController();
  setTimeout(() => c.abort(), ms);
  return c;
}

// ── FETCH BINANCE KLINES ──
async function fetchKlines(sym, tf, limit = 500) {
  const c = timeout(10000);
  const res = await fetch(
    `https://api.binance.com/api/v3/klines?symbol=${sym}USDT&interval=${tf}&limit=${limit}`,
    { signal: c.signal }
  );
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const raw = await res.json();
  // [openTime, open, high, low, close, volume, ...]
  return raw.map(k => ({
    t: k[0],
    o: parseFloat(k[1]),
    h: parseFloat(k[2]),
    l: parseFloat(k[3]),
    c: parseFloat(k[4]),
    v: parseFloat(k[5]),
  }));
}

// ── FETCH LIVE TOP 300 BINANCE SPOT LIST ──
async function fetchBinanceTop100() {
  try {
    const c = timeout(10000);
    const res = await fetch('https://api.binance.com/api/v3/ticker/24hr', { signal: c.signal });
    const data = await res.json();
    return data
      .filter(t => t.symbol.endsWith('USDT') && !t.symbol.includes('_'))
      .sort((a,b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
      .slice(0, 300)
      .map(t => ({ sym: t.symbol.replace('USDT',''), chg: parseFloat(t.priceChangePercent), price: parseFloat(t.lastPrice) }));
  } catch(e) {
    return TOP100.map(sym => ({ sym, chg: 0, price: 0 }));
  }
}

// ══════════════════════════════════════════════
// ── PATTERN DETECTION ENGINE ──
// Pattern: Higher High 1 → retrace → Higher High 2 → currently dropping
// ══════════════════════════════════════════════

function detectPattern(candles, sensitivity) {
  // Sensitivity config
  const cfg = {
    loose:  { peakWindow: 5,  minRetraceRatio: 0.15, minHHRatio: 1.005, dropFromPeak: 0.008, minSwingAmp: 0.03 },
    normal: { peakWindow: 8,  minRetraceRatio: 0.25, minHHRatio: 1.01,  dropFromPeak: 0.012, minSwingAmp: 0.05 },
    strict: { peakWindow: 12, minRetraceRatio: 0.35, minHHRatio: 1.02,  dropFromPeak: 0.02,  minSwingAmp: 0.08 },
  }[sensitivity];

  const closes = candles.map(c => c.c);
  const highs  = candles.map(c => c.h);
  const lows   = candles.map(c => c.l);
  const n      = candles.length;

  // ── STEP 1: Find significant peaks using local maxima ──
  // A peak is a high that is the highest point in a window of ±peakWindow candles
  function findPeaks() {
    const peaks = [];
    const w = cfg.peakWindow;
    for (let i = w; i < n - w; i++) {
      let isPeak = true;
      for (let j = i - w; j <= i + w; j++) {
        if (j !== i && highs[j] >= highs[i]) { isPeak = false; break; }
      }
      if (isPeak) peaks.push({ idx: i, price: highs[i] });
    }
    return peaks;
  }

  // ── STEP 2: Find significant troughs ──
  function findTroughs() {
    const troughs = [];
    const w = Math.max(3, Math.floor(cfg.peakWindow * 0.6));
    for (let i = w; i < n - w; i++) {
      let isTrough = true;
      for (let j = i - w; j <= i + w; j++) {
        if (j !== i && lows[j] <= lows[i]) { isTrough = false; break; }
      }
      if (isTrough) troughs.push({ idx: i, price: lows[i] });
    }
    return troughs;
  }

  const peaks   = findPeaks();
  const troughs = findTroughs();

  if (peaks.length < 2) return null;

  // ── STEP 3: Find the best HH1 → trough → HH2 sequence ──
  // We scan backward from end to find the most recent valid pattern
  let bestMatch = null;
  let bestScore = 0;

  for (let pi2 = peaks.length - 1; pi2 >= 1; pi2--) {
    const peak2 = peaks[pi2];
    // Only consider peaks that are NOT the very last candle (need drop after)
    if (peak2.idx >= n - 3) continue;

    for (let pi1 = pi2 - 1; pi1 >= 0; pi1--) {
      const peak1 = peaks[pi1];

      // HH2 must be HIGHER than HH1
      if (peak2.price < peak1.price * cfg.minHHRatio) continue;

      // Swing amplitude must be significant (not tiny noise)
      const priceRange = Math.max(...highs) - Math.min(...lows);
      const peakSpread = peak2.price - peak1.price;
      if (peak1.price === 0) continue;
      const swing = (peak2.price - peak1.price) / peak1.price;
      if (swing < cfg.minSwingAmp) continue;

      // There must be a trough BETWEEN the two peaks
      const troughBetween = troughs.filter(t => t.idx > peak1.idx && t.idx < peak2.idx);
      if (!troughBetween.length) continue;
      const midTrough = troughBetween.reduce((a,b) => b.price < a.price ? b : a); // lowest trough between

      // Retrace: trough must be meaningfully below peak1 (not just a tiny dip)
      const retrace = (peak1.price - midTrough.price) / (peak2.price - midTrough.price + 0.0001);
      if (retrace < cfg.minRetraceRatio) continue;

      // ── STEP 4: Confirm currently dropping from peak2 ──
      // Check that recent candles (after peak2) are lower than peak2
      const afterPeak2 = candles.slice(peak2.idx + 1);
      if (!afterPeak2.length) continue;

      const currentClose = closes[n - 1];
      const dropFromPeak = (peak2.price - currentClose) / peak2.price;
      if (dropFromPeak < cfg.dropFromPeak) continue;

      // ── STEP 5: Confirm the drop is recent (not already recovered) ──
      // Price should still be falling: last close < close 3 candles ago
      const recentFalling = closes[n-1] < closes[Math.max(0, n-4)];

      // ── STEP 6: Score the pattern ──
      let score = 0;

      // HH strength (how much higher is HH2 vs HH1)
      const hhStrength = (peak2.price - peak1.price) / peak1.price;
      if (hhStrength > 0.08) score += 30;
      else if (hhStrength > 0.04) score += 20;
      else score += 10;

      // Retrace quality (deeper retrace = cleaner pattern)
      if (retrace > 0.5) score += 25;
      else if (retrace > 0.35) score += 15;
      else score += 8;

      // Drop from peak2 (actively dropping)
      if (dropFromPeak > 0.05) score += 25;
      else if (dropFromPeak > 0.025) score += 15;
      else score += 8;

      // Currently falling confirmed
      if (recentFalling) score += 15;

      // Pattern recency: prefer recent patterns
      const recency = peak2.idx / n;
      score += Math.round(recency * 5);

      // Peak separation (not too close, not too far)
      const separation = peak2.idx - peak1.idx;
      if (separation > 20 && separation < 200) score += 5;

      if (score > bestScore) {
        bestScore = score;
        bestMatch = {
          peak1, peak2, midTrough,
          retrace, hhStrength, dropFromPeak,
          recentFalling, score,
          afterCandles: afterPeak2.length,
          currentClose,
        };
      }

      // Only need the most recent valid HH1 for this HH2
      break;
    }

    if (bestMatch) break; // found most recent pattern, stop
  }

  if (!bestMatch) return null;

  // ── STEP 7: Compute confidence % ──
  // Max theoretical score ~100
  const confidence = Math.min(99, Math.round(bestMatch.score));

  return {
    ...bestMatch,
    confidence,
    signal: confidence >= 65 ? 'strong' : 'mod',
    candles,
  };
}

// ── DRAW MINI CHART ──
function drawMiniChart(canvas, candles, match) {
  const W = canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  const H = canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const n = candles.length;
  // Show last 120 candles for visibility
  const view = candles.slice(Math.max(0, n - 120));
  const vn = view.length;

  const mn = Math.min(...view.map(c => c.l));
  const mx = Math.max(...view.map(c => c.h));
  const pad = (mx - mn) * 0.1;
  const lo = mn - pad, hi = mx + pad;

  const xOf = i => (i / (vn - 1)) * W;
  const yOf = p => H - ((p - lo) / (hi - lo)) * H;

  // Draw close line
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(107,92,231,0.3)');
  grad.addColorStop(1, 'rgba(107,92,231,0)');

  ctx.beginPath();
  view.forEach((c, i) => { i === 0 ? ctx.moveTo(xOf(i), yOf(c.c)) : ctx.lineTo(xOf(i), yOf(c.c)); });
  ctx.strokeStyle = '#6b5ce7';
  ctx.lineWidth = 1.5 * window.devicePixelRatio;
  ctx.stroke();

  // Fill under line
  ctx.lineTo(xOf(vn-1), H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Overlay: draw drop portion in red
  const offset = Math.max(0, n - 120);
  const p2ViewIdx = match.peak2.idx - offset;
  if (p2ViewIdx >= 0 && p2ViewIdx < vn) {
    ctx.beginPath();
    for (let i = p2ViewIdx; i < vn; i++) {
      i === p2ViewIdx ? ctx.moveTo(xOf(i), yOf(view[i].c)) : ctx.lineTo(xOf(i), yOf(view[i].c));
    }
    ctx.strokeStyle = '#ff4466';
    ctx.lineWidth = 2 * window.devicePixelRatio;
    ctx.stroke();

    // Peak2 dot
    ctx.beginPath();
    ctx.arc(xOf(p2ViewIdx), yOf(match.peak2.price), 3 * window.devicePixelRatio, 0, Math.PI * 2);
    ctx.fillStyle = '#8b7cf8'; ctx.fill();
  }

  // Peak1 dot
  const p1ViewIdx = match.peak1.idx - offset;
  if (p1ViewIdx >= 0 && p1ViewIdx < vn) {
    ctx.beginPath();
    ctx.arc(xOf(p1ViewIdx), yOf(match.peak1.price), 3 * window.devicePixelRatio, 0, Math.PI * 2);
    ctx.fillStyle = '#6b5ce7'; ctx.fill();
  }
}

// ── FORMAT ──
function fmtPct(n) { return (n * 100).toFixed(2) + '%'; }
function fmtP(p, ref) {
  if (p < 0.0001) return p.toFixed(8);
  if (p < 0.01) return p.toFixed(5);
  if (p < 1) return p.toFixed(4);
  if (p < 100) return p.toFixed(2);
  return p.toFixed(1);
}

// ── RENDER ──
function renderResults() {
  const out = $('out');
  if (!results.length) {
    out.innerHTML = `<div class="list"><div class="empty">
      <div class="empty-ico">📊</div>
      <div class="empty-t">No pattern found</div>
      <div class="empty-s">Try a looser sensitivity or different timeframe.<br>The pattern may not be forming right now.</div>
    </div></div>`;
    return;
  }

  const strong = results.filter(r => r.signal === 'strong');
  const mod    = results.filter(r => r.signal === 'mod');
  let html = '';

  if (strong.length) {
    html += `<div class="sec-lbl">🔥 Strong Match (${strong.length})</div><div class="list" id="strongList"></div>`;
  }
  if (mod.length) {
    html += `<div class="sec-lbl">⚡ Moderate Match (${mod.length})</div><div class="list" id="modList"></div>`;
  }
  out.innerHTML = html;

  const buildCard = (r, idx) => {
    const chgCls = r.chg >= 0 ? 'up' : 'dn';
    const chgStr = (r.chg >= 0 ? '+' : '') + r.chg.toFixed(2) + '%';
    const dropCls = r.match.dropFromPeak > 0.03 ? 'r' : 'y';

    const el = document.createElement('div');
    el.className = 'card ' + r.signal;
    el.style.animationDelay = (idx * 0.04) + 's';
    el.innerHTML = `
      <div class="ctop">
        <div class="cico">
          <img src="https://assets.coincap.io/assets/icons/${r.sym.toLowerCase()}@2x.png"
               onerror="this.style.display='none';this.parentNode.textContent='${r.sym.slice(0,3)}'" alt="">
        </div>
        <div class="cmain">
          <div class="csym">${r.sym}<span class="crank">#${idx+1}</span></div>
          <div class="cmeta"><span class="${chgCls}">${chgStr}</span> · $${fmtP(r.price)}</div>
        </div>
        <div class="conf-badge ${r.signal === 'strong' ? 's' : 'm'}">${r.match.confidence}% match</div>
      </div>
      <div class="mini-chart"><canvas id="chart-${r.sym}"></canvas></div>
      <div class="pmets">
        <div class="pmet">
          <div class="pmet-l">HH Strength</div>
          <div class="pmet-v v">+${fmtPct(r.match.hhStrength)}</div>
        </div>
        <div class="pmet">
          <div class="pmet-l">Retrace</div>
          <div class="pmet-v g">${fmtPct(r.match.retrace)}</div>
        </div>
        <div class="pmet">
          <div class="pmet-l">Drop Now</div>
          <div class="pmet-v ${dropCls}">-${fmtPct(r.match.dropFromPeak)}</div>
        </div>
        <div class="pmet">
          <div class="pmet-l">Falling</div>
          <div class="pmet-v ${r.match.recentFalling ? 'r' : 'g'}">${r.match.recentFalling ? '↓ YES' : '↗ No'}</div>
        </div>
      </div>
      <div class="conf-row">
        <div class="conf-label">Confidence</div>
        <div class="conf-track"><div class="conf-fill" style="width:${r.match.confidence}%"></div></div>
        <div class="conf-pct">${r.match.confidence}%</div>
      </div>
      <button class="obtn" onclick="event.stopPropagation();openChart('${r.sym}')">
        📈 Open ${r.sym}/USDT on Binance
      </button>`;
    el.onclick = () => openChart(r.sym);
    return el;
  };

  strong.forEach((r,i) => {
    const el = buildCard(r, i);
    document.getElementById('strongList')?.appendChild(el);
    // Draw chart after DOM insert
    requestAnimationFrame(() => {
      const canvas = document.getElementById('chart-' + r.sym);
      if (canvas) drawMiniChart(canvas, r.match.candles, r.match);
    });
  });

  mod.forEach((r,i) => {
    const el = buildCard(r, i + strong.length);
    document.getElementById('modList')?.appendChild(el);
    requestAnimationFrame(() => {
      const canvas = document.getElementById('chart-' + r.sym);
      if (canvas) drawMiniChart(canvas, r.match.candles, r.match);
    });
  });
}

// ── MAIN SCAN ──
async function runScan() {
  const btn = $('scanBtn');
  btn.className = 'scan-btn busy';
  btn.innerHTML = '<div class="spin"></div><span>SCANNING...</span>';
  $('progWrap').style.display = 'block';
  $('statRow').style.display = 'none';
  $('out').innerHTML = '';
  showErr('');
  results = [];
  setProgress(0, 'Loading top coins from Binance...');

  try {
    // Step 1: Get live top coins
    const coins = await fetchBinanceTop100();
    const total = coins.length;
    setProgress(5, `Scanning ${total} coins on ${activeTF}...`);

    // Step 2: Fetch klines and detect pattern in batches
    const batchSize = 6;
    let done = 0;

    for (let i = 0; i < coins.length; i += batchSize) {
      const batch = coins.slice(i, i + batchSize);
      await Promise.allSettled(batch.map(async coin => {
        try {
          const candles = await fetchKlines(coin.sym, activeTF, 500);
          if (candles.length < 50) return;

          const match = detectPattern(candles, activeSens);
          if (match) {
            results.push({
              sym: coin.sym,
              chg: coin.chg || (candles[candles.length-1].c - candles[0].o) / candles[0].o * 100,
              price: coin.price || candles[candles.length-1].c,
              match,
              signal: match.signal,
            });
          }
        } catch(e) { /* skip failed symbols */ }
        done++;
      }));

      const pct = 5 + (done / total) * 90;
      setProgress(pct, `Analyzed ${done}/${total} · ${results.length} matches so far...`);
      // small yield to keep UI responsive
      await new Promise(r => setTimeout(r, 20));
    }

    // Sort by confidence
    results.sort((a,b) => b.match.confidence - a.match.confidence);

    setProgress(100, 'Done!');
    setTimeout(() => { $('progWrap').style.display = 'none'; }, 500);

    $('sScanned').textContent = done;
    $('sMatched').textContent = results.length;
    $('sStrong').textContent = results.filter(r => r.signal === 'strong').length;
    $('statRow').style.display = 'flex';

    renderResults();

  } catch(e) {
    $('progWrap').style.display = 'none';
    showErr('⚠ Scan failed: ' + e.message);
  }

  btn.className = 'scan-btn';
  btn.innerHTML = '<span id="btnTxt">↺ RE-SCAN</span>';
}

function openChart(sym) {
  window.open(`https://www.binance.com/en/trade/${sym}_USDT?type=spot`, '_blank');
}

// Auto-run
window.addEventListener('DOMContentLoaded', () => setTimeout(runScan, 400));
</script>
